version: "3.9"

services:
  api:
    build: .
    container_name: passos-magicos-api
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  monitoring:
    build: .
    container_name: passos-magicos-monitoring
    command: >
      streamlit run monitoring/drift_dashboard.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
      - ./monitoring:/app/monitoring
    environment:
      - PYTHONPATH=/app
    depends_on:
      - api
    restart: unless-stopped
